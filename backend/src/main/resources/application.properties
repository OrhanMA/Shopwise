spring.application.name=ShopWise Backend
spring.application.name=shopwise-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shopwise}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:shopwise}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:shopwise}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
server.port=${SERVER_PORT:8080}
